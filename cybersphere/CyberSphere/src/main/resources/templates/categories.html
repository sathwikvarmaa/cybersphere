<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories • CyberSphere</title>
  <link rel="stylesheet" href="/static/css/app.css"/>
</head>
<body>
<header class="topbar">
  <div class="brand">CyberSphere</div>
  <nav class="nav">
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/search">Search</a>
    <a class="nav-link" href="/admin">Admin</a>
  </nav>
</header>

<main class="container">
  <section class="panel glass">
    <h2 class="panel-title">Categories</h2>

    <div class="category-grid">
      <div class="cat-card" th:each="c : ${categories}">
        <div class="cat-name" th:text="${c.name}">Name</div>
        <div class="cat-desc muted" th:text="${c.description}">Description</div>
        <a class="link" th:href="@{'/category/'+${c.id}}">Explore</a>
      </div>
    </div>
  </section>
</main>
</body>
</html>
