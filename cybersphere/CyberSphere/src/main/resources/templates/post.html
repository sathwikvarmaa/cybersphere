<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${post.title} + ' • CyberSphere'">Post • CyberSphere</title>
  <link rel="stylesheet" href="/static/css/app.css"/>
</head>
<body>
<header class="topbar">
  <div class="brand">CyberSphere</div>
  <nav class="nav">
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/search">Search</a>
    <a class="nav-link" href="/categories">Categories</a>
    <a class="nav-link" href="/profile">Profile</a>
  </nav>
</header>

<main class="container">
  <article class="post-hero glass">
    <div class="post-banner">
      <img class="banner-img" th:src="@{'/' + ${post.imagePath}}" alt="" />
    </div>

    <div class="post-header">
      <h1 class="post-h1" th:text="${post.title}">Title</h1>
      <div class="post-meta muted">
        By <a class="link" th:href="@{'/author/'+${post.authorId}}" th:text="${post.authorUsername}">author</a>
        • <span th:text="${post.createdAt}">date</span>
      </div>

      <div class="post-actions">
        <button class="btn" type="button" th:onclick="window.csx.like('+${post.id}+')">👍 Like</button>
        <button class="btn" type="button" th:onclick="window.csx.bookmark('+${post.id}+')">🔖 Bookmark</button>
        <a class="btn" th:href="@{'/post/'+${post.id}+'/comments'}">Jump to comments</a>
      </div>
    </div>

    <div class="post-content" th:utext="${post.content}"></div>
  </article>

  <section class="panel glass" style="margin-top:16px;">
    <h2 class="panel-title">Comments</h2>

    <form class="form" method="post" action="/post/" >
      <input type="hidden" name="postId" th:value="${post.id}"/>
      <label class="label">Add a comment</label>
      <textarea class="input" name="body" rows="4"></textarea>
      <button class="btn primary" type="submit">Publish comment</button>
    </form>

    <div class="comment-list">
      <div class="comment" th:each="c : ${comments}">
        <div class="comment-author muted" th:text="${c.authorUsername}">user</div>
        <div class="comment-body" th:utext="${c.body}"></div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
